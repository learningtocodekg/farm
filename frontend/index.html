<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Farm Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #f9f9f9; }
      #splat-root { position: fixed; inset: 0; z-index: 0; }
      #splat-root canvas { width: 100% !important; height: 100% !important; display: block; }
      #root { position: fixed; inset: 0; z-index: 1; pointer-events: none; background: transparent; }
      #root [data-ui="true"] { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="splat-root"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
